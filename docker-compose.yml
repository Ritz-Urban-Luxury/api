services:
  api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: mongodb://mongo:27017/rul
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: "3000"
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:6
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
